server {
    listen 80;
    listen [::]:80;
    server_name airproche.docufisc.de www.airproche.docufisc.de;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/airproche-certbot;
        default_type text/plain;
    }

    location / {
        return 308 https://airproche.docufisc.de$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.airproche.docufisc.de;

    ssl_certificate /etc/letsencrypt-airproche/live/airproche.docufisc.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt-airproche/live/airproche.docufisc.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 308 https://airproche.docufisc.de$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name airproche.docufisc.de;

    ssl_certificate /etc/letsencrypt-airproche/live/airproche.docufisc.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt-airproche/live/airproche.docufisc.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 1m;

    location /django-static/ {
        alias /home/mignon/airproche/shared/static/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 65s;
        proxy_hide_header Server;
        proxy_hide_header Strict-Transport-Security;
    }

    location /django-admin/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header Server;
        proxy_hide_header Strict-Transport-Security;
    }

    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header X-Powered-By;
    }
}
