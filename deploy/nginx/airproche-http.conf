server {
    listen 80;
    listen [::]:80;
    server_name airproche.docufisc.de www.airproche.docufisc.de;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/airproche-certbot;
        default_type text/plain;
    }

    location / {
        add_header Retry-After 300 always;
        return 503 "Airproche deployment pending TLS configuration.\n";
    }
}
